<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZK Arquitectura y Construcción</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; color: #333; background: #fff; overflow-x: hidden; }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }

    /* NAVBAR */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 15px 50px;
      background: rgba(255,255,255,0.97);
      border-bottom: 1px solid rgba(0,0,0,0.07);
      backdrop-filter: blur(10px);
    }
    .navbar .logo img { height: 55px; width: auto; }
    .navbar nav { display: flex; gap: 40px; }
    .navbar nav a {
      font-family: 'Oswald', sans-serif; font-size: 13px;
      letter-spacing: 3px; text-transform: uppercase; color: #333;
      transition: color 0.3s;
    }
    .navbar nav a:hover { color: #2471C0; }

    /* HAMBURGER */
    .hamburger {
      display: none; flex-direction: column; gap: 5px;
      cursor: pointer; padding: 5px;
    }
    .hamburger span {
      width: 25px; height: 2px; background: #333;
      transition: all 0.3s;
    }
    .mobile-menu {
      display: none; position: fixed; top: 85px; left: 0; right: 0;
      background: #fff; border-bottom: 1px solid rgba(0,0,0,0.07);
      padding: 20px; z-index: 999; flex-direction: column; gap: 20px;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      font-family: 'Oswald', sans-serif; font-size: 14px;
      letter-spacing: 3px; text-transform: uppercase; color: #333;
      padding: 10px 0; border-bottom: 1px solid #f0f0f0;
    }

    @media (max-width: 768px) {
      .navbar { padding: 15px 20px; }
      .navbar nav { display: none; }
      .hamburger { display: flex; }
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="logo">
      <img src="logo-zk.png" alt="ZK Arquitectura y Construcción">
    </div>
    <nav>
      <a href="#portafolio">Portafolio</a>
      <a href="#servicios">Servicios</a>
      <a href="#nosotros">Nosotros</a>
      <a href="#contacto">Contacto</a>
    </nav>
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
  </header>

  <div class="mobile-menu" id="mobileMenu">
    <a href="#portafolio" onclick="closeMobileMenu()">Portafolio</a>
    <a href="#servicios" onclick="closeMobileMenu()">Servicios</a>
    <a href="#nosotros" onclick="closeMobileMenu()">Nosotros</a>
    <a href="#contacto" onclick="closeMobileMenu()">Contacto</a>
  </div>

  <script>
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    hamburger.addEventListener('click', () => mobileMenu.classList.toggle('open'));
    function closeMobileMenu() { mobileMenu.classList.remove('open'); }
  </script>
</body>
</html>
