<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZK Arquitectura y Construcción</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; color: #333; background: #fff; overflow-x: hidden; }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }

    /* NAVBAR */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 15px 50px;
      background: rgba(255,255,255,0.97);
      border-bottom: 1px solid rgba(0,0,0,0.07);
      backdrop-filter: blur(10px);
    }
    .navbar .logo img { height: 55px; width: auto; }
    .navbar nav { display: flex; gap: 40px; }
    .navbar nav a {
      font-family: 'Oswald', sans-serif; font-size: 13px;
      letter-spacing: 3px; text-transform: uppercase; color: #333;
      transition: color 0.3s;
    }
    .navbar nav a:hover { color: #2471C0; }

    /* HAMBURGER */
    .hamburger {
      display: none; flex-direction: column; gap: 5px;
      cursor: pointer; padding: 5px;
    }
    .hamburger span {
      width: 25px; height: 2px; background: #333;
      transition: all 0.3s;
    }
    .mobile-menu {
      display: none; position: fixed; top: 85px; left: 0; right: 0;
      background: #fff; border-bottom: 1px solid rgba(0,0,0,0.07);
      padding: 20px; z-index: 999; flex-direction: column; gap: 20px;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      font-family: 'Oswald', sans-serif; font-size: 14px;
      letter-spacing: 3px; text-transform: uppercase; color: #333;
      padding: 10px 0; border-bottom: 1px solid #f0f0f0;
    }

    @media (max-width: 768px) {
      .navbar { padding: 15px 20px; }
      .navbar nav { display: none; }
      .hamburger { display: flex; }
    }

    /* HERO */
    .hero {
      display: flex; min-height: 100vh; padding-top: 85px;
    }
    .hero-left {
      flex: 0 0 45%; background: #1a1a1a;
      display: flex; flex-direction: column; justify-content: center;
      padding: 80px 60px; color: #fff;
    }
    .hero-left h1 {
      font-family: 'Oswald', sans-serif; font-weight: 700;
      font-size: clamp(50px, 6vw, 85px); line-height: 1; text-transform: uppercase;
    }
    .hero-left h1 .accent {
      font-family: 'Playfair Display', serif; font-style: italic; color: #2471C0;
    }
    .hero-left .divider { width: 50px; height: 3px; background: #2471C0; margin: 30px 0; }
    .hero-left p { font-size: 16px; color: #888; line-height: 1.6; margin-bottom: 35px; }
    .hero-buttons { display: flex; align-items: center; gap: 25px; margin-bottom: 50px; }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 16px 35px; background: #2471C0; color: #fff;
      font-family: 'Oswald', sans-serif; font-size: 12px;
      letter-spacing: 3px; text-transform: uppercase; transition: background 0.3s;
    }
    .btn-primary:hover { background: #1a5ca0; }
    .btn-secondary {
      font-family: 'Oswald', sans-serif; font-size: 12px;
      letter-spacing: 3px; text-transform: uppercase; color: #888; transition: color 0.3s;
    }
    .btn-secondary:hover { color: #fff; }
    .hero-stats { display: flex; gap: 40px; }
    .hero-stats .stat h3 {
      font-family: 'Oswald', sans-serif; font-size: 55px; font-weight: 700; color: #fff;
    }
    .hero-stats .stat h3 .dot { color: #2471C0; }
    .hero-stats .stat span {
      font-family: 'Oswald', sans-serif; font-size: 10px;
      letter-spacing: 3px; text-transform: uppercase; color: #666;
    }
    .hero-right {
      flex: 1;
      background: url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=1400') center/cover no-repeat;
    }
    @media (max-width: 768px) {
      .hero { flex-direction: column; }
      .hero-left { flex: none; padding: 60px 30px; }
      .hero-right { min-height: 50vh; }
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="logo">
      <img src="logo-zk.png" alt="ZK Arquitectura y Construcción">
    </div>
    <nav>
      <a href="#portafolio">Portafolio</a>
      <a href="#servicios">Servicios</a>
      <a href="#nosotros">Nosotros</a>
      <a href="#contacto">Contacto</a>
    </nav>
    <div class="hamburger" id="hamburger" aria-label="Abrir menú" aria-expanded="false">
      <span></span><span></span><span></span>
    </div>
  </header>

  <div class="mobile-menu" id="mobileMenu">
    <a href="#portafolio" onclick="closeMobileMenu()">Portafolio</a>
    <a href="#servicios" onclick="closeMobileMenu()">Servicios</a>
    <a href="#nosotros" onclick="closeMobileMenu()">Nosotros</a>
    <a href="#contacto" onclick="closeMobileMenu()">Contacto</a>
  </div>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-left">
      <h1>DISEÑO.<br>OBRA.<br><span class="accent">LLAVE.</span></h1>
      <div class="divider"></div>
      <p>Del concepto a la construcción, sin intermediarios.<br>Arquitectura y construcción en un solo equipo.</p>
      <div class="hero-buttons">
        <a href="#contacto" class="btn-primary">COTIZAR PROYECTO →</a>
        <a href="#portafolio" class="btn-secondary">VER PROYECTOS</a>
      </div>
      <div class="hero-stats">
        <div class="stat">
          <h3>+15<span class="dot">.</span></h3>
          <span>AÑOS DE EXPERIENCIA</span>
        </div>
        <div class="stat">
          <h3>+30<span class="dot">.</span></h3>
          <span>PROYECTOS EJECUTADOS</span>
        </div>
      </div>
    </div>
    <div class="hero-right"></div>
  </section>

  <script>
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    hamburger.addEventListener('click', () => {
      mobileMenu.classList.toggle('open');
      hamburger.setAttribute('aria-expanded', mobileMenu.classList.contains('open').toString());
    });
    function closeMobileMenu() {
      mobileMenu.classList.remove('open');
      hamburger.setAttribute('aria-expanded', 'false');
    }
  </script>
</body>
</html>
